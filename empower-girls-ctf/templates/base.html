<!-- Updated base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Empower Girls CTF</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/rapid7-square.png') }}">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
    <link rel="stylesheet" href="https://unpkg.com/dragula@3.7.3/dist/dragula.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cipher-challenge@1.0.0/dist/cipher-challenge.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .content-wrapper {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <!-- Navigation bar with Rapid7 styling -->
    <nav class="navbar navbar-expand-lg" style="background-color: #000000;">
        <div class="container-fluid">
            <div class="row w-100 align-items-center">
                <!-- Left-aligned logo -->
                <div class="col-auto">
                    <a href="{{ url_for('home') }}">
                        <img src="{{ url_for('static', filename='images/rapid7-logo.png') }}" alt="Rapid7 Logo" style="height: 80px; margin-right: 15px;">
                    </a>
                </div>
                <!-- Center-aligned title -->
                <div class="col text-center">
                    <a class="navbar-brand text-white" href="{{ url_for('home') }}">
                        <strong>Empower Girls CTF</strong>
                    </a>
                </div>
                <!-- Right-aligned secret button -->
                <div class="col-auto text-end">
                    <form method="POST" action="{{ url_for('finish') }}">
                        <button type="submit" style="background: none; border: none; padding: 0;">
                            <img src="{{ url_for('static', filename='images/empower-girls-icon.png') }}" alt="Empower Girls Icon" style="height: 70px;">
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Wrap main content in a flex-growing div -->
    <div class="content-wrapper">
        <div class="container my-4">
            <div class="ctf-container">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Team Score Display - Conditionally Rendered -->
    {% if request.endpoint not in ['home', 'register', 'scoreboard'] %}
    <div class="team-score-section py-3">
        <div class="container">
            <div class="d-flex justify-content-center align-items-center">
                <div class="score-card d-flex bg-light align-items-center shadow-sm rounded px-4 py-3">
                    <!-- Enlarged team icon (3x original size) -->
                    <div class="score-icon me-4">
                        <img src="{{ url_for('static', filename='images/icon-team.png') }}" alt="Team" 
                             style="height: 120px; width: auto;">
                    </div>
                    <!-- Horizontal layout for score text and value -->
                    <div class="score-content d-flex align-items-center">
                        <div class="score-label text-uppercase fw-bold me-2" style="font-size: 1.2rem; color: #6c757d;">
                            Team Score =
                        </div>
                        <div class="team-score fs-1 fw-bold" style="color: #FF6200;">
                            <span id="team-score-display">{{ session.get('team_score', 0) }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endif %}

    <!-- Footer will now always stay at the bottom -->
    <footer class="text-center py-4 bg-light text-dark">
        <div class="d-flex flex-column align-items-center">
            <div class="p-3 border rounded bg-white">
                <img src="{{ url_for('static', filename='images/empower-girls-brand.png') }}" alt="Empower Girls Icon" style="height: 80px; margin-bottom: 10px;">
            </div>
            <p class="mb-0 text-secondary">Powered by Rapid7 • Part of the Empower Girls event</p>
        </div>
    </footer>

    <!-- Bootstrap and Animation JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/dragula@3.7.3/dist/dragula.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/party-js@latest/bundle/party.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typeit@8.7.1/dist/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cipher-challenge@1.0.0/dist/cipher-challenge.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>

    {% block scripts %}{% endblock %}

    <script>
        // Update team score on page load and after challenges
        document.addEventListener('DOMContentLoaded', function() {
            // Fetch current score from server
            fetch('/api/get_team_score')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('team-score-display').textContent = data.score;
                    }
                })
                .catch(error => console.error('Error fetching score:', error));
                
            // Listen for score update events
            window.addEventListener('score-updated', function(e) {
                document.getElementById('team-score-display').textContent = e.detail.newScore;
            });
        });
    </script>
</body>
</html>
